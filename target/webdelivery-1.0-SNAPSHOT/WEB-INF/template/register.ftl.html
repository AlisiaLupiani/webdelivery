<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrazione - WebDelivery</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 24px; box-sizing: border-box; }
        .register-box { background: white; padding: 36px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 520px; }
        h2 { color: #ff8c00; margin: 0 0 20px; text-align: center; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .form-group { text-align: left; }
        .form-group.full { grid-column: 1 / -1; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn-register { background-color: #ff8c00; color: white; border: none; padding: 12px 20px; width: 100%; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 22px; }
        .btn-register:hover { background-color: #e07b00; }
        .error-msg { background-color: #ffebee; color: #d32f2f; padding: 10px; border-radius: 5px; margin-bottom: 20px; font-size: 14px; border: 1px solid #ffcdd2; }
        .switch-link { text-align: center; margin: 18px 0 0; color: #555; }
        .switch-link a { color: #ff8c00; font-weight: bold; text-decoration: none; }
        @media (max-width: 600px) {
            .register-box { padding: 28px 22px; }
            .form-grid { grid-template-columns: 1fr; }
            .form-group.full { grid-column: auto; }
        }
    </style>
</head>
<body>

<div class="register-box">
    <h2>Crea account cliente</h2>

    <#if errore??>
        <div class="error-msg">${errore}</div>
    </#if>

    <form action="/webdelivery/register" method="POST">
        <div class="form-grid">
            <div class="form-group">
                <label for="nome">Nome</label>
                <input type="text" id="nome" name="nome" required value="${nome!""}">
            </div>

            <div class="form-group">
                <label for="cognome">Cognome</label>
                <input type="text" id="cognome" name="cognome" required value="${cognome!""}">
            </div>

            <div class="form-group full">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required value="${email!""}">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>

            <div class="form-group">
                <label for="conferma_password">Conferma password</label>
                <input type="password" id="conferma_password" name="conferma_password" required>
            </div>

            <div class="form-group full">
                <label for="indirizzo">Indirizzo</label>
                <input type="text" id="indirizzo" name="indirizzo" required value="${indirizzo!""}">
            </div>

            <div class="form-group full">
                <label for="telefono">Telefono</label>
                <input type="tel" id="telefono" name="telefono" required value="${telefono!""}">
            </div>
        </div>

        <button type="submit" class="btn-register">Registrati</button>
    </form>

    <p class="switch-link">Hai gia' un account? <a href="/webdelivery/login">Accedi</a></p>
</div>

</body>
</html>
