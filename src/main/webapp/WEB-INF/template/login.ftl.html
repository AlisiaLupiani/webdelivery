<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - WebMarket</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #ff8c00; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; }
        input[type="email"], input[type="password"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn-login { background-color: #ff8c00; color: white; border: none; padding: 12px 20px; width: 100%; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        .btn-login:hover { background-color: #e07b00; }
        .error-msg { background-color: #ffebee; color: #d32f2f; padding: 10px; border-radius: 5px; margin-bottom: 20px; font-size: 14px; border: 1px solid #ffcdd2; }
        .switch-link { margin-top: 18px; color: #555; }
        .switch-link a { color: #ff8c00; font-weight: bold; text-decoration: none; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Bentornato! 👋</h2>
    
    <#-- Se la Servlet ci passa un messaggio di errore, lo stampiamo qui -->
    <#if errore??>
        <div class="error-msg">${errore}</div>
    </#if>

    <form action="/webdelivery/login" method="POST">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="Inserisci la tua email" value="${email!""}">
        </div>
        
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="Inserisci la tua password">
        </div>
        
        <button type="submit" class="btn-login">Accedi</button>
    </form>

    <p class="switch-link">Non hai un account? <a href="/webdelivery/register">Registrati</a></p>
</div>

</body>
</html>
